.<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta
    name="viewport"
    content="width=device-width,initial-scale=1"
  >

  <title>자동차 안심연락 QR</title>

  <link
    rel="manifest"
    href="/manifest.webmanifest"
  >

  <link
    rel="stylesheet"
    href="/app.css"
  >

  <style>
    .process-button {
      width: 100%;
      min-height: 56px;
      margin-top: 18px;
      border: 0;
      border-radius: 12px;
      background: #1769e8;
      color: #fff;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
    }

    .process-button:disabled {
      background: #aeb5bd;
      cursor: not-allowed;
    }

    .process-note {
      margin: 0;
      color: #666;
      text-align: center;
      line-height: 1.7;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>

<body>

<main class="wrap">

  <div class="brand">
    <h1>자동차 안심연락 QR</h1>

    <p>
      차주 전화번호는 호출자에게 표시되지 않습니다.
    </p>
  </div>


  <section
    id="loadingBox"
    class="card"
  >
    <p class="process-note">
      등록 정보를 확인하고 있습니다.
    </p>
  </section>


  <section
    id="invalidBox"
    class="card hidden"
  >
    <h2>사용할 수 없는 QR입니다</h2>

    <p
      id="invalidMessage"
      class="note"
    >
      QR 정보를 확인할 수 없습니다.
    </p>
  </section>


  <!-- 미등록 차량 등록 진행 화면 -->
  <section
    id="registerBox"
    class="card hidden"
  >
    <h2>차량 등록</h2>

    <p class="process-note">
      아래 버튼을 눌러 등록을 계속해 주세요.
    </p>

    <button
      type="button"
      id="continueBtn"
      class="process-button"
    >
      계속하기
    </button>

    <!-- 브라우저가 자동 알림창을 막을 경우에만 표시 -->
    <button
      type="button"
      id="notifyFallbackBtn"
      class="process-button hidden"
    >
      알림 허용
    </button>

    <div
      id="regMsg"
      class="msg"
    ></div>
  </section>


  <!-- 기존 차량 호출 화면 유지 -->
  <section
    id="callBox"
    class="card hidden"
  >
    <h2>차량 호출</h2>

    <p>
      차주에게 요청 내용을 안전하게 전달합니다.
    </p>

    <button
      data-kind="move"
      class="primary callBtn"
    >
      차량이동요청
    </button>

    <button
      data-kind="emergency"
      class="danger callBtn"
    >
      긴급호출
    </button>

    <div
      id="callMsg"
      class="msg"
    ></div>

    <p class="note">
      반복·허위 호출은 제한될 수 있습니다.
    </p>
  </section>

</main>


<script>
(function () {
  "use strict";

  let deferredPrompt = null;
  let code = "";
  let phone = "";
  let pushSubscription = null;
  let processing = false;

  const $ = function (id) {
    return document.getElementById(id);
  };


  function msg(id, text, ok) {
    const element = $(id);

    if (!element) {
      return;
    }

    element.textContent = text;
    element.className =
      "msg show " + (ok ? "ok" : "err");
  }


  function hide(id) {
    const element = $(id);

    if (element) {
      element.classList.add("hidden");
    }
  }


  function show(id) {
    const element = $(id);

    if (element) {
      element.classList.remove("hidden");
    }
  }


  function isStandalone() {
    return (
      window.matchMedia(
        "(display-mode: standalone)"
      ).matches ||
      window.navigator.standalone === true
    );
  }


  function cleanPhone(value) {
    return String(value || "")
      .replace(/\D/g, "");
  }


  function validPhone(value) {
    return /^01[016789]\d{7,8}$/.test(
      cleanPhone(value)
    );
  }


  function urlBase64ToUint8Array(value) {
    const padding =
      "=".repeat(
        (4 - value.length % 4) % 4
      );

    const base64 =
      (value + padding)
        .replace(/-/g, "+")
        .replace(/_/g, "/");

    const rawData =
      window.atob(base64);

    const outputArray =
      new Uint8Array(rawData.length);

    for (
      let i = 0;
      i < rawData.length;
      i++
    ) {
      outputArray[i] =
        rawData.charCodeAt(i);
    }

    return outputArray;
  }


  /*
   * 아임웹에서 전달된 QR번호와 전화번호 저장
   * 설치 후 다시 실행해도 유지됩니다.
   */
  function readRegistrationData() {
    const params =
      new URLSearchParams(
        window.location.search
      );

    const queryCode =
      (
        params.get("qr") ||
        params.get("code") ||
        params.get("qr_code") ||
        ""
      ).trim();

    const queryPhone =
      cleanPhone(
        params.get("phone") || ""
      );

    if (queryCode) {
      localStorage.setItem(
        "pendingVehicleQrCode",
        queryCode
      );
    }

    if (queryPhone) {
      localStorage.setItem(
        "pendingVehiclePhone",
        queryPhone
      );
    }

    code =
      queryCode ||
      localStorage.getItem(
        "pendingVehicleQrCode"
      ) ||
      "";

    phone =
      queryPhone ||
      cleanPhone(
        localStorage.getItem(
          "pendingVehiclePhone"
        ) || ""
      );
  }


  /*
   * 서비스워커 준비
   */
  async function prepareServiceWorker() {
    if (
      !("serviceWorker" in navigator)
    ) {
      throw new Error(
        "현재 브라우저에서는 알림을 지원하지 않습니다."
      );
    }

    await navigator
      .serviceWorker
      .register("/sw.js");

    return await navigator
      .serviceWorker
      .ready;
  }


  /*
   * 푸시 알림 허용 및 구독
   */
  async function requestPushPermission() {
    if (
      !("Notification" in window)
    ) {
      throw new Error(
        "현재 브라우저에서는 알림을 사용할 수 없습니다."
      );
    }

    const permission =
      await Notification
        .requestPermission();

    if (
      permission !== "granted"
    ) {
      throw new Error(
        "알림을 허용해야 등록할 수 있습니다."
      );
    }

    const registration =
      await prepareServiceWorker();

    let subscription =
      await registration
        .pushManager
        .getSubscription();

    if (!subscription) {
      const response =
        await fetch(
          "/api/vapid-public",
          {
            cache: "no-store"
          }
        );

      const result =
        await response.json();

      if (
        !response.ok ||
        !result.publicKey
      ) {
        throw new Error(
          "알림 연결 정보를 불러오지 못했습니다."
        );
      }

      subscription =
        await registration
          .pushManager
          .subscribe({
            userVisibleOnly: true,

            applicationServerKey:
              urlBase64ToUint8Array(
                result.publicKey
              )
          });
    }

    pushSubscription =
      subscription;

    return subscription;
  }


  /*
   * 실제 차량 등록 저장
   */
  async function saveRegistration() {
    if (!code) {
      throw new Error(
        "QR 번호를 확인할 수 없습니다."
      );
    }

    if (!validPhone(phone)) {
      throw new Error(
        "휴대전화번호를 확인할 수 없습니다. 처음 등록 화면에서 다시 시작해 주세요."
      );
    }

    if (!pushSubscription) {
      throw new Error(
        "알림 연결이 완료되지 않았습니다."
      );
    }

    const response =
      await fetch(
        "/api/register",
        {
          method: "POST",

          headers: {
            "content-type":
              "application/json"
          },

          body:
            JSON.stringify({
              code: code,
              phone: phone,
              subscription:
                pushSubscription
            })
        }
      );

    const result =
      await response.json();

    if (!response.ok) {
      throw new Error(
        result.error ||
        "차량을 등록하지 못했습니다."
      );
    }

    localStorage.removeItem(
      "pendingVehiclePhone"
    );

    localStorage.removeItem(
      "pendingVehicleQrCode"
    );

    msg(
      "regMsg",
      "차량 등록이 완료되었습니다.",
      true
    );

    setTimeout(
      function () {
        window.location.href =
          "/72.html?qr=" +
          encodeURIComponent(code);
      },
      900
    );
  }


  /*
   * 알림 허용부터 등록 완료까지 진행
   */
  async function completeRegistration() {
    try {
      $("continueBtn").disabled = true;
      $("notifyFallbackBtn").disabled = true;

      msg(
        "regMsg",
        "알림 허용을 확인해 주세요.",
        true
      );

      await requestPushPermission();

      msg(
        "regMsg",
        "등록을 처리하고 있습니다.",
        true
      );

      await saveRegistration();

    } catch (error) {
      console.error(error);

      msg(
        "regMsg",
        error.message ||
        "등록 중 오류가 발생했습니다.",
        false
      );

      $("continueBtn").disabled = false;
      $("notifyFallbackBtn").disabled = false;

      /*
       * 알림창이 자동으로 뜨지 않은 경우에만
       * 알림 허용 버튼 표시
       */
      if (
        "Notification" in window &&
        Notification.permission === "default"
      ) {
        show(
          "notifyFallbackBtn"
        );
      }

      processing = false;
    }
  }


  /*
   * 계속하기:
   * 앱 설치 → 알림 허용 → 등록 완료
   */
  async function startRegistration() {
    if (processing) {
      return;
    }

    processing = true;

    $("continueBtn").disabled = true;

    try {
      if (!code) {
        throw new Error(
          "QR 번호를 확인할 수 없습니다."
        );
      }

      if (!validPhone(phone)) {
        throw new Error(
          "휴대전화번호를 확인할 수 없습니다. 처음 등록 화면에서 다시 시작해 주세요."
        );
      }

      await prepareServiceWorker();

      /*
       * 설치된 앱에서 실행한 경우
       * 설치 과정 없이 알림 허용으로 진행
       */
      if (isStandalone()) {
        await completeRegistration();
        return;
      }

      /*
       * 설치창을 사용할 수 있는 경우
       */
      if (deferredPrompt) {
        deferredPrompt.prompt();

        const choice =
          await deferredPrompt.userChoice;

        deferredPrompt = null;

        if (
          choice.outcome !== "accepted"
        ) {
          throw new Error(
            "앱을 설치해야 등록할 수 있습니다."
          );
        }

        await completeRegistration();
        return;
      }

      /*
       * 이미 설치됐거나 설치창이 나타나지 않는 경우
       * 알림 허용과 등록을 계속 진행
       */
      await completeRegistration();

    } catch (error) {
      console.error(error);

      msg(
        "regMsg",
        error.message ||
        "등록 중 오류가 발생했습니다.",
        false
      );

      $("continueBtn").disabled = false;
      processing = false;
    }
  }


  /*
   * QR 상태 확인
   */
  async function load() {
    readRegistrationData();

    try {
      if (!code) {
        throw new Error(
          "QR번호가 없습니다."
        );
      }

      const response =
        await fetch(
          "/api/qr?code=" +
          encodeURIComponent(code),
          {
            cache: "no-store"
          }
        );

      const result =
        await response.json();

      hide("loadingBox");

      if (
        !response.ok ||
        !result.valid
      ) {
        $("invalidMessage").textContent =
          result.error ||
          "등록된 발급목록에 포함되지 않은 QR입니다.";

        show("invalidBox");
        return;
      }

      if (result.registered) {
        show("callBox");
        return;
      }

      if (!validPhone(phone)) {
        $("invalidMessage").textContent =
          "휴대전화번호를 확인할 수 없습니다. 처음 등록 화면에서 다시 시작해 주세요.";

        show("invalidBox");
        return;
      }

      show("registerBox");

    } catch (error) {
      hide("loadingBox");

      $("invalidMessage").textContent =
        error.message ||
        "QR 정보를 확인하지 못했습니다.";

      show("invalidBox");
    }
  }


  /*
   * 기존 차량이동요청·긴급호출 코드 유지
   */
  document
    .querySelectorAll(".callBtn")
    .forEach(
      function (button) {
        button.onclick =
          async function () {
            button.disabled = true;

            try {
              const response =
                await fetch(
                  "/api/request",
                  {
                    method: "POST",

                    headers: {
                      "content-type":
                        "application/json"
                    },

                    body:
                      JSON.stringify({
                        code: code,
                        kind:
                          button.dataset.kind
                      })
                  }
                );

              const result =
                await response.json();

              msg(
                "callMsg",

                response.ok
                  ? "요청이 접수되었습니다. 차주에게 알림을 보냈습니다."
                  : (
                      result.error ||
                      "요청하지 못했습니다."
                    ),

                response.ok
              );

            } catch (error) {
              msg(
                "callMsg",
                "요청 중 오류가 발생했습니다.",
                false
              );

            } finally {
              button.disabled = false;
            }
          };
      }
    );


  window.addEventListener(
    "beforeinstallprompt",
    function (event) {
      event.preventDefault();

      deferredPrompt =
        event;
    }
  );


  window.addEventListener(
    "appinstalled",
    function () {
      deferredPrompt = null;
    }
  );


  $("continueBtn").onclick =
    startRegistration;


  $("notifyFallbackBtn").onclick =
    completeRegistration;


  load();

})();
</script>

</body>
</html>
