<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>자동차 QR 호출</title>
  <script src="https://jsdelivr.net"></script>
  <style>
    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body { margin: 0; padding: 20px; background: #f3f5f7; color: #222; font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", sans-serif; }
    button { font-family: inherit; }
    .container { width: 100%; max-width: 460px; margin: 0 auto; }
    .card { margin-top: 30px; padding: 28px 20px; background: #fff; border-radius: 20px; box-shadow: 0 7px 25px rgba(0, 0, 0, 0.08); }
    h1 { margin: 0; text-align: center; line-height: 1.4; font-size: 26px; }
    .description { margin: 12px 0 26px; color: #666; text-align: center; font-size: 15px; line-height: 1.7; }
    .call-button { width: 100%; min-height: 56px; margin-top: 18px; padding: 10px; border: 0; border-radius: 13px; color: #fff; font-size: 18px; font-weight: 800; cursor: pointer; }
    .call-button.move { background: #2563eb; }
    .call-button.emergency { background: #dc2626; }
    button:disabled { background: #aeb5bd !important; cursor: not-allowed; }
    .message { display: none; margin-top: 16px; padding: 14px; border-radius: 11px; font-size: 14px; font-weight: 600; line-height: 1.6; text-align: center; }
    .message.show { display: block; }
    .message.info { background: #eef5ff; color: #1558b0; }
    .message.success { background: #ecfff5; color: #087846; }
    .message.error { background: #fff0f0; color: #c62828; }
    .notice { margin-top: 20px; color: #777; font-size: 12px; line-height: 1.7; text-align: center; }
    .call-status { margin-top: 18px; padding: 15px; border-radius: 12px; background: #f5f7fa; text-align: center; font-size: 15px; font-weight: 700; line-height: 1.7; }
  </style>
</head>
<body>
  <main class="container">
    <section class="card">

      <div id="callScreen">
        <h1>자동차 QR 호출</h1>
        <p class="description">차주 휴대전화번호는 표시되지 않습니다.<br>필요한 요청을 선택해 주세요.</p>
        
        <button type="button" id="moveButton" class="call-button move">차량이동요청</button>
        <button type="button" id="emergencyButton" class="call-button emergency" disabled>긴급통화</button>
        
        <div id="callStatus" class="call-status">차량이동요청 0/3회</div>
        <div id="callMessage" class="message"></div>
        
        <div class="notice">
          차량이동요청은 3분 간격으로 3회 전송됩니다.<br>
          3차 요청 후 3분이 지나면 긴급통화가 가능합니다.<br>
          최초 요청부터 긴급통화까지 총 9분입니다.
        </div>
      </div>

    </section>
  </main>

<script>
(() => {
  "use strict";

  const SUPABASE_URL = "https://supabase.co";
  const SUPABASE_KEY = "sb_publishable_RZBX7u1v8MLBCfEJT0-eRg_jPcIulG2";
  const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const moveButton = document.getElementById("moveButton");
  const emergencyButton = document.getElementById("emergencyButton");
  const callStatus = document.getElementById("callStatus");
  const callMessage = document.getElementById("callMessage");

  let callCount = 0;

  // 🔍 [보안 필터 추가] 주소창의 phone 값에서 불필요한 대시(-) 기호를 완벽하게 지우고 숫자만 정제
  const urlParams = new URLSearchParams(window.location.search);
  let rawPhone = urlParams.get("phone") || "01000000000";
  const ownerPhone = rawPhone.replace(/[^0-9]/g, ""); // 숫자가 아닌 모든 특수기호 강제 제거

  // 1. 차량이동요청 버튼 클릭
  if (moveButton) {
    moveButton.addEventListener("click", async () => {
      if (callCount >= 3) return;

      callCount++;
      if (callStatus) callStatus.textContent = `차량이동요청 ${callCount}/3회`;
      
      if (callMessage) {
        callMessage.className = "message info show";
        callMessage.textContent = `${callCount}차 차량이동 알림을 전송 중입니다...`;
      }

      // 정제된 깨끗한 번호 데이터로 Supabase 전송 시도
      const { data, error } = await db
        .from('calls')
        .insert([{ target_phone: ownerPhone, call_round: callCount, status: 'pending' }]);

      if (error) {
        console.error("Supabase 통신 오류:", error.message);
        if (callMessage) {
          callMessage.className = "message error show";
          callMessage.textContent = "알림 전송 실패: " + error.message;
        }
        return;
      }

      if (callMessage) {
        callMessage.className = "message success show";
        callMessage.textContent = `성공: 차주에게 ${callCount}차 차량이동 푸시 알림이 발송되었습니다.`;
      }

      if (callCount === 3) {
        if (moveButton) moveButton.disabled = true;
        if (callMessage) {
          callMessage.className = "message info show";
          callMessage.textContent = "3차 요청이 완료되었습니다. 3분 후 응답이 없으면 긴급통화가 활성화됩니다.";
        }
        
        setTimeout(() => {
          if (emergencyButton) emergencyButton.disabled = false;
          if (callMessage) {
            callMessage.className = "message error show";
            callMessage.textContent = "차주가 응답하지 않아 긴급통화 기능이 활성화되었습니다.";
          }
        }, 180000);
      }
    });
  }

  // 2. 긴급통화 버튼 클릭
  if (emergencyButton) {
    emergencyButton.addEventListener("click", () => {
      window.location.href = `tel:${ownerPhone}`; 
    });
  }
})();
</script>
</body>
</html>
