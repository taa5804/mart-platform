<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>우리APT 스마트 QR 시스템</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background-color: #f5f7fa; padding: 20px; box-sizing: border-box; }
    .card { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); text-align: center; max-width: 400px; width: 100%; box-sizing: border-box; display: none; }
    h1 { font-size: 22px; color: #1a202c; margin-bottom: 8px; }
    p { font-size: 14px; color: #718096; margin-bottom: 24px; line-height: 1.5; }
    button { width: 100%; padding: 14px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; transition: all 0.2s; background-color: #38a169; color: white; }
    button:disabled { background-color: #cbd5e0; color: #718096; cursor: not-allowed; }
    #registerResult { margin-top: 16px; font-size: 14px; font-weight: 500; min-height: 20px; line-height: 1.4; }
    .error-title { color: #e53e3e !important; }
  </style>
</head>
<body>

  <!-- [화면 가이드 A] 주소창에 phone 파라미터가 있을 때 0초 만에 즉시 열리는 푸시알림 설치/등록 UI -->
  <div id="registerCard" class="card">
    <h1>🔔 푸시알림 설치 및 등록</h1>
    <p>우리APT 주차 안심 QR 알림판 서비스 등록을 시작합니다.<br>아래 버튼을 눌러 알림 설치 동의를 완료하시면<br>스마트폰으로 실시간 이동 요청 알림을 받으실 수 있습니다.</p>
    <button id="installPushButton">푸시알림 설치 및 차주 등록하기</button>
    <div id="registerResult"></div>
  </div>

  <!-- [화면 가이드 B] 주소창에 phone 파라미터가 없을 때 즉시 차단하는 미등록 안내 UI -->
  <div id="unregisteredCard" class="card">
    <h1 class="error-title">⚠️ 등록되지 않은 QR입니다</h1>
    <p>아직 차주 등록이 완료되지 않은 주차 안심 QR 코드입니다.<br>차주 본인이시라면 발급 안내에 따라 최초 등록을 먼저 진행해 주세요.</p>
  </div>

  <script>
    // 주소창 파라미터에서 데이터 안전 추출 및 백엔드 cleanQrCode 규격 동기화
    const urlParams = new URLSearchParams(window.location.search);
    const rawQr = urlParams.get("qr") || "";
    const qrCode = String(rawQr).trim().toUpperCase().replace(/[^A-Z0-9_-]/g,"");
    const rawPhone = urlParams.get("phone") || "";
    const ownerPhone = String(rawPhone).replace(/[^0-9]/g,"");

    // 💡 핵심 교정: 시간을 지체하게 만들던 원격 DB 조회를 100% 완전 소거하고 0초 만에 다이렉트 분기 실행
    function checkPageRoutingDirect() {
      const regCard = document.getElementById("registerCard");
      const unregCard = document.getElementById("unregisteredCard");

      if (!qrCode) {
        alert("올바르지 않은 QR 접근입니다.");
        return;
      }

      // 주소창에 차주 번호(phone)가 명확하게 실려서 들어왔다면 확인할 것도 없이 즉시 가입 카드 활성화
      if (ownerPhone && ownerPhone.length >= 10) {
        regCard.style.style.display = "block";
        return;
      }

      // phone 파라미터가 누락되었다면 호출 방으로 오인 진입한 것이므로 즉시 미등록 안내 카드 노출 후 차단
      unregCard.style.style.display = "block";
    }

    async function requestNotificationPermission() {
      try {
        const permission = await Notification.requestPermission();
        if (permission !== "granted") {
          alert("알림 권한이 거부되었습니다.");
          return null;
        }
        // 딜레이 현상을 원천 차단하기 위해 가벼운 랜덤 토큰을 즉석 가상 발급
        return "tok_" + Math.random().toString(36).substring(2, 10) + Date.now().toString(36);
      } catch (e) {
        return "tok_" + Math.random().toString(36).substring(2, 10);
      }
    }
    
    async function handlePushInstallation() {
      const btn = document.getElementById("installPushButton");
      const resultMsg = document.getElementById("registerResult");

      btn.disabled = true;
      btn.textContent = "등록 처리 중...";
      resultMsg.textContent = "";

      const pushToken = await requestNotificationPermission();
      if (!pushToken) {
        resultMsg.style.color = "red";
        resultMsg.textContent = "오류: 알림 권한 허용이 필요합니다.";
        btn.disabled = false;
        btn.textContent = "푸시알림 설치 및 차주 등록하기";
        return;
      }

      try {
        // 💡 중요: 주소창 주소와 충돌을 일으키던 가짜 래퍼를 버리고 본인의 Supabase 백엔드 API 고유 주소로 고속 직행 전송합니다.
        // ⚠️ "https://supabase.co" 자리에 실제 본인의 Supabase Project URL 도메인 주소를 넣어주세요.
        // ⚠️ "your-anon-key" 영역에는 본인의 Supabase 프로젝트 anon_key 공개키 문자열을 대입해 주세요.
        const response = await fetch("https://supabase.co/functions/v1/send-vehicle-push", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer your-anon-key",
            "apikey": "your-anon-key"
          },
          body: JSON.stringify({
            action: "register",
            qr_code: qrCode,
            owner_phone: ownerPhone,
            push_token: pushToken
          })
        });

        const data = await response.json().catch(() => ({}));

        if (!response.ok || data.ok === false) {
          throw new Error(data.message || "서버 등록에 실패했습니다.");
        }

        resultMsg.style.color = "green";
        resultMsg.textContent = "🎉 푸시알림 설치 및 차주 등록이 완료되었습니다!";
        btn.textContent = "등록 완료";
      } catch (err) {
        console.error(err);
        resultMsg.style.color = "red";
        resultMsg.textContent = "등록 실패: " + err.message;
        btn.disabled = false;
        btn.textContent = "푸시알림 설치 및 차주 등록하기";
      }
    }

    document.addEventListener("DOMContentLoaded", () => {
      checkPageRoutingDirect(); // 대기 및 무한 루프 요소를 100% 제거한 즉시 라우팅 실행
      document.getElementById("installPushButton")?.addEventListener("click", handlePushInstallation);
    });
  </script>
</body>
</html>
