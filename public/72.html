<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>우리APT 스마트 차량 시스템</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background-color: #f5f7fa; padding: 20px; box-sizing: border-box; }
    .card { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); text-align: center; max-width: 400px; width: 100%; box-sizing: border-box; display: none; }
    h1 { font-size: 22px; color: #1a202c; margin-bottom: 8px; }
    p { font-size: 14px; color: #718096; margin-bottom: 24px; line-height: 1.5; }
    button { width: 100%; padding: 14px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; transition: all 0.2s; margin-bottom: 12px; }
    
    /* 1. 차주 등록 모드 스타일 (초록색) */
    .register-mode button { background-color: #38a169; color: white; }
    
    /* 2. 차량 호출 모드 스타일 (파란색/빨간색) */
    .call-mode #pushButton { background-color: #3182ce; color: white; }
    .call-mode #pushButton:disabled { background-color: #cbd5e0; color: #718096; cursor: not-allowed; }
    .call-mode #emergencyButton { background-color: #e53e3e; color: white; display: none; }
    .call-mode #emergencyButton:disabled { background-color: #fed7d7; color: #e53e3e; cursor: not-allowed; }
    
    .resultMessage { margin-top: 16px; font-size: 14px; font-weight: 500; min-height: 20px; line-height: 1.4; }
    #loading { font-size: 16px; color: #4a5568; font-weight: bold; }
  </style>
  <script src="https://jsdelivr.net"></script>
</head>
<body>

  <!-- 1. 진입 시 최초 상태 체크 중 로딩 안내 -->
  <div id="loading">차량 및 QR 상태 확인 중...</div>

  <!-- 2. [차주 미등록 시 노출] 푸시알림 설치 및 가입 카드 -->
  <div id="registerCard" class="card register-mode">
    <h1>🔔 푸시알림 설치 및 등록</h1>
    <p>우리APT 주차 안심 QR 알림판 서비스 등록을 시작합니다.<br>아래 버튼을 눌러 알림 설치 동의를 완료하시면<br>스마트폰으로 실시간 이동 요청 알림을 받으실 수 있습니다.</p>
    <button id="installPushButton">푸시알림 설치 및 차주 등록하기</button>
    <div id="registerResult" class="resultMessage"></div>
  </div>

  <!-- 3. [차주 등록 완료 시 노출] 방문객 차량이동요청(호출) 카드 -->
  <div id="callCard" class="card call-mode">
    <h1>🚗 차량이동 요청</h1>
    <p>앞 차량 때문에 차를 빼지 못하고 계신가요?<br>차주에게 안전하게 이동 요청 알림을 보냅니다.</p>
    <button id="pushButton" disabled>푸시알림 보내기</button>
    <button id="emergencyButton">🚨 차주와 긴급 통화하기</button>
    <div id="callResult" class="resultMessage"></div>
  </div>

  <script type="module">
    // ⚠️ "https://supabase.co" 자리에 본인의 실제 Supabase Project URL 주소를 넣어주세요.
    // ⚠️ "your-anon-key" 자리에 본인의 실제 Supabase anon_key 문자열을 넣어주세요.
    const db = supabase.createClient("https://supabase.co", "your-anon-key");

    const urlParams = new URLSearchParams(window.location.search);
    const rawQr = urlParams.get("qr") || "";
    const qrCode = String(rawQr).trim().toUpperCase().replace(/[^A-Z0-9_-]/g,"");
    const rawPhone = urlParams.get("phone") || "";
    const ownerPhone = String(rawPhone).replace(/[^0-9]/g,"");

    function getOrCreateSessionId(){let sessionId=localStorage.getItem("caller_session_id");if(!sessionId||sessionId.length<12){sessionId="sess_"+Math.random().toString(36).substring(2,14);localStorage.setItem("caller_session_id",sessionId)}return sessionId}
    const callerSessionId=getOrCreateSessionId();

    // 💡 열리자마자 백엔드 status를 조회하여 방을 자동으로 스위칭합니다.
    async function checkSystemStatus(){
      const loading = document.getElementById("loading");
      const regCard = document.getElementById("registerCard");
      const callCard = document.getElementById("callCard");
      if(!qrCode){
        loading.textContent = "오류: 올바르지 않은 QR 접근입니다.";
        return;
      }
      try {
        const {data:statusData, error:statusError} = await db.functions.invoke("send-vehicle-push", {
          body: { action: "status", qr_code: qrCode }
        });
        if(statusError || !statusData) {
          loading.textContent = "시스템 점검 중입니다. 잠시 후 다시 시도해 주세요.";
          return;
        }
        loading.style.display = "none";
        
        // 데이터베이스에 등록 정보가 없다면 -> [2번 등록 카드] 노출
        if(statusData.exists === false || statusData.is_registered === false) {
          regCard.style.display = "block";
          return;
        }
        // 이미 등록이 완료된 차량이라면 -> [3번 호출 호출 카드] 노출
        callCard.style.display = "block";
        await checkCallStatus();
      } catch(err) {
        loading.textContent = "네트워크 연결 실패";
      }
    }

    async function checkCallStatus(){
      const pushButton = document.getElementById("pushButton");
      const emergencyButton = document.getElementById("emergencyButton");
      try {
        const {data, error} = await db.functions.invoke("send-vehicle-push", {
          body: { action: "call-status", qr_code: qrCode, caller_session_id: callerSessionId }
        });
        if(error || !data || data.ok === false) return;
        if(data.next_call_available) {
          pushButton.disabled = false;
          pushButton.textContent = data.call_count === 0 ? "푸시알림 보내기" : `${data.call_count}차 요청 완료 (추가 가능)`;
        } else {
          pushButton.disabled = true;
          if(data.call_count >= 3) {
            pushButton.textContent = "3차 호출 완료 (호출 마감)";
          } else {
            pushButton.textContent = "대기 시간 제한 (잠시 후 가능)";
          }
        }
        if(emergencyButton) {
          if(data.emergency_available) {
            emergencyButton.style.display = "block";
            emergencyButton.disabled = false;
            emergencyButton.textContent = "🚨 차주와 긴급 통화하기";
          } else {
            if(data.emergency_call_used) {
              emergencyButton.style.display = "block";
              emergencyButton.disabled = true;
              emergencyButton.textContent = "❌ 긴급통화 사용 완료";
            } else if(data.call_count >= 3) {
              emergencyButton.style.display = "block";
              emergencyButton.disabled = true;
              emergencyButton.textContent = "⏳ 잠시 후 긴급통화 가능";
            } else {
              emergencyButton.style.display = "none";
            }
          }
        }
      } catch(err) { console.error(err); }
    }

    async function requestNotificationPermission(){
      try {
        const permission = await Notification.requestPermission();
        if(permission !== "granted") {
          alert("알림 권한이 거부되었습니다. 브라우저 설정에서 알림 수신을 허용해 주세요.");
          return null;
        }
        if("serviceWorker" in navigator) {
          const reg = await navigator.serviceWorker.register("/firebase-messaging-sw.js").catch(() => null);
          if(reg && "pushManager" in reg) {
            const sub = await reg.pushManager.getSubscription() || await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:"YOUR_VAPID_PUBLIC_KEY"});
            if(sub) { return btoa(JSON.stringify(sub)); }
          }
        }
        return "token_" + Math.random().toString(36).substring(2, 10);
      } catch(e) {
        return "token_" + Math.random().toString(36).substring(2, 10);
      }
    }
    
    async function handlePushInstallation(){
      const btn = document.getElementById("installPushButton");
      const resultMsg = document.getElementById("registerResult");
      if(!qrCode || !ownerPhone) {
        alert("오류: 주소창 파라미터 정보가 누락되었습니다.");
        return;
      }
      btn.disabled = true;
      btn.textContent = "푸시알림 설치 및 등록 중...";
      resultMsg.textContent = "";
      const pushToken = await requestNotificationPermission();
      if(!pushToken) {
        resultMsg.style.color = "red";
        resultMsg.textContent = "오류: 알림 권한 허용이 필요합니다.";
        btn.disabled = false;
        btn.textContent = "푸시알림 설치 및 차주 등록하기";
        return;
      }
      try {
        const {data, error} = await db.functions.invoke("send-vehicle-push", {
          body: { action: "register", qr_code: qrCode, owner_phone: ownerPhone, push_token: pushToken }
        });
        if(error) throw new Error(error.message);
        if(data && data.ok === false) throw new Error(data.message || "등록 실패");
        resultMsg.style.color = "green";
        resultMsg.textContent = "🎉 푸시알림 설치 및 차주 등록이 완료되었습니다! 페이지를 새로고침하시면 호출 모드로 즉시 전환됩니다.";
        btn.textContent = "등록 완료";
      } catch(err) {
        resultMsg.style.color = "red";
        resultMsg.textContent = "등록 실패: " + (err.message || "알 수 없는 오류");
        btn.disabled = false;
        btn.textContent = "푸시알림 설치 및 차주 등록하기";
      }
    }

    async function sendVehicleCall(){
      const pushButton = document.getElementById("pushButton");
      const resultMessage = document.getElementById("callResult");
      pushButton.disabled = true;
      pushButton.textContent = "전송 중...";
      try {
        const {data, error} = await db.functions.invoke("send-vehicle-push", {
          body: { action: "call", qr_code: qrCode, caller_session_id: callerSessionId }
        });
        if(error || (data && data.ok === false)) throw new Error(data?.message || "전송 실패");
        resultMessage.style.color = "green";
        resultMessage.textContent = `🎉 ${data.call_count}차 차량이동 요청이 차주에게 전송되었습니다.`;
        await checkCallStatus();
      } catch(error) {
        resultMessage.style.color = "red";
        resultMessage.textContent = "전송 실패: " + error.message;
        pushButton.disabled = false;
        pushButton.textContent = "푸시알림 보내기";
      }
    }

    async function startEmergencyCall(){
      const {data, error} = await db.functions.invoke("send-vehicle-push", {
        body: { action: "emergency-call", qr_code: qrCode, caller_session_id: callerSessionId, caller_phone: "00000000000" }
      });
      if(!error && data && data.tel_url) window.location.href = data.tel_url;
    }

    document.addEventListener("DOMContentLoaded", () => {
