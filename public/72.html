<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>우리APT 차량이동 호출</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background-color: #f5f7fa; padding: 20px; box-sizing: border-box; }
    .card { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); text-align: center; max-width: 400px; width: 100%; box-sizing: border-box; }
    h1 { font-size: 22px; color: #1a202c; margin-bottom: 8px; }
    p { font-size: 14px; color: #718096; margin-bottom: 24px; line-height: 1.5; }
    button { width: 100%; padding: 14px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; transition: all 0.2s; margin-bottom: 12px; }
    #pushButton { background-color: #3182ce; color: white; display: none; }
    #pushButton:disabled { background-color: #cbd5e0; color: #718096; cursor: not-allowed; }
    #registerLinkButton { background-color: #38a169; color: white; display: none; }
    #emergencyButton { background-color: #e53e3e; color: white; display: none; }
    #emergencyButton:disabled { background-color: #fed7d7; color: #e53e3e; cursor: not-allowed; }
    #pushResult { margin-top: 16px; font-size: 14px; font-weight: 500; min-height: 20px; line-height: 1.4; }
  </style>
  <script src="https://jsdelivr.net"></script>
</head>
<body>

  <div class="card">
    <h1 id="mainTitle">🚗 차량이동 요청</h1>
    <p id="mainDesc">앞 차량 때문에 차를 빼지 못하고 계신가요?<br>차주에게 안전하게 이동 요청 알림을 보냅니다.</p>
    
    <!-- 상태에 따라 유동적으로 표시될 인터페이스 버튼들 -->
    <button id="registerLinkButton">⚙️ 차주 최초 등록하러 가기</button>
    <button id="pushButton">푸시알림 보내기</button>
    <button id="emergencyButton">🚨 차주와 긴급 통화하기</button>
    
    <div id="pushResult"></div>
  </div>

  <script type="module">
    const supabaseUrl=window.location.origin.includes("localhost")?"":Deno.env.get("SUPABASE_URL");const supabaseKey=window.location.origin.includes("localhost")?"":Deno.env.get("SUPABASE_ANON_KEY");const db=supabase.createClient(supabaseUrl||"https://supabase.co",supabaseKey||"your-anon-key");const urlParams=new URLSearchParams(window.location.search);const rawQr=urlParams.get("qr")||"";const qrCode=String(rawQr).trim().toUpperCase().replace(/[^A-Z0-9_-]/g,"");function getOrCreateSessionId(){let sessionId=localStorage.getItem("caller_session_id");if(!sessionId||sessionId.length<12){sessionId="sess_"+Math.random().toString(36).substring(2,14);localStorage.setItem("caller_session_id",sessionId)}return sessionId}const callerSessionId=getOrCreateSessionId();async function checkQrStatusAndInit(){const pushButton=document.getElementById("pushButton");const registerBtn=document.getElementById("registerLinkButton");const title=document.getElementById("mainTitle");const desc=document.getElementById("mainDesc");const resultMessage=document.getElementById("pushResult");if(!qrCode){if(resultMessage)resultMessage.textContent="오류: 올바르지 않은 QR 접근입니다.";return}try{const{data:qrStatus,error:qrError}=await db.functions.invoke("send-vehicle-push",{body:{action:"status",qr_code:qrCode}});if(qrError||!qrStatus){console.error("QR 상태 확인 실패");return}if(qrStatus.exists===false||qrStatus.is_registered===false){title.textContent="⚙️ 미등록 차량 QR";desc.innerHTML="아직 차주가 등록되지 않은 스마트 QR 안내판입니다.<br>차주 본인이시라면 아래 버튼을 눌러 최초 등록을 진행하세요.";registerBtn.style.display="block";pushButton.style.display="none";return}registerBtn.style.display="none";pushButton.style.display="block";await checkCallStatus()}catch(err){console.error("초기 QR 검증 중 네트워크 오류:",err)}}async function checkCallStatus(){const pushButton=document.getElementById("pushButton");const emergencyButton=document.getElementById("emergencyButton");try{const{data,error}=await db.functions.invoke("send-vehicle-push",{body:{action:"call-status",qr_code:qrCode,caller_session_id:callerSessionId}});if(error||!data||data.ok===false)return;if(data.next_call_available){pushButton.disabled=false;pushButton.textContent=data.call_count===0?"푸시알림 보내기":`${data.call_count}차 요청 완료 (추가 가능)`}else{pushButton.disabled=true;if(data.call_count>=3){pushButton.textContent="3차 호출 완료 (호출 마감)"}else{pushButton.textContent="대기 시간 제한 (잠시 후 가능)"}}if(emergencyButton){if(data.emergency_available){emergencyButton.style.display="block";emergencyButton.disabled=false;emergencyButton.textContent="🚨 차주와 긴급 통화하기"}else{if(data.emergency_call_used){emergencyButton.style.display="block";emergencyButton.disabled=true;emergencyButton.textContent="❌ 긴급통화 사용 완료"}else if(data.call_count>=3){emergencyButton.style.display="block";emergencyButton.disabled=true;emergencyButton.textContent="⏳ 잠시 후 긴급통화 가능"}else{emergencyButton.style.display="none"}}}}catch(err){console.error("상태 조회 중 오류:",err)}}async function sendVehicleCall(){const pushButton=document.getElementById("pushButton");const resultMessage=document.getElementById("pushResult");if(!qrCode)return;pushButton.disabled=true;pushButton.textContent="전송 중...";resultMessage.textContent="";try{const{data,error}=await db.functions.invoke("send-vehicle-push",{body:{action:"call",qr_code:qrCode,caller_session_id:callerSessionId}});if(error)throw new Error(error.message);if(data&&data.ok===false)throw new Error(data.message||"푸시알림 전송 실패");resultMessage.style.color="green";resultMessage.textContent=`🎉 ${data.call_count}차 차량이동 요청이 차주에게 전송되었습니다.`;await checkCallStatus()}catch(error){resultMessage.style.color="red";resultMessage.textContent="전송 실패: "+(error.message||"알 수 없는 오류");pushButton.disabled=false;pushButton.textContent="푸시알림 보내기"}}async function startEmergencyCall(){const resultMessage=document.getElementById("pushResult");const callerPhone=prompt("차주와 전화를 연결하기 위해 본인의 휴대전화 번호를 입력해 주세요.\n(숫자만 입력)");if(!callerPhone)return;try{const{data,error}=await db.functions.invoke("send-vehicle-push",{body:{action:"emergency-call",qr_code:qrCode,caller_session_id:callerSessionId,caller_phone:callerPhone}});if(error)throw new Error(error.message);if(data&&data.ok===false)throw new Error(data.message||"긴급통화 요청 실패");resultMessage.style.color="blue";resultMessage.textContent="차주 연락처로 전화를 연결합니다.";if(data.tel_url)window.location.href=data.tel_url;await checkCallStatus()}catch(error){alert("오류: "+error.message)}}document.addEventListener("DOMContentLoaded",()=>{checkQrStatusAndInit();document.getElementById("registerLinkButton")?.addEventListener("click",()=>{window.location.href=`/register.html?qr=${encodeURIComponent(qrCode)}`;});document.getElementById("pushButton")?.addEventListener("click",sendVehicleCall);document.getElementById("emergencyButton")?.addEventListener("click",startEmergencyCall)});
  </script>
</body>
</html>
