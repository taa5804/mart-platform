<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>자동차 안심연락 QR</title><link rel="manifest" href="/manifest.webmanifest"><link rel="stylesheet" href="/app.css"></head>
<body><main class="wrap"><div class="brand"><h1>자동차 안심연락 QR</h1><p>차주 전화번호는 호출자에게 표시되지 않습니다.</p></div>
<section class="card"><div id="qrCode" class="code">QR 확인 중…</div><div style="margin-top:9px"><span id="status" class="status wait">조회 중</span></div></section>

<section id="invalidBox" class="card hidden"><h2>사용할 수 없는 QR입니다</h2><p class="note">QR번호가 없거나 등록된 발급목록에 포함되지 않았습니다.</p></section>

<section id="registerBox" class="card hidden">
<h2>차량 등록</h2><p class="note">앱 설치와 알림 허용을 완료해야 등록할 수 있습니다.</p>
<button id="installBtn" class="secondary">1. 앱 설치하기</button>
<button id="notifyBtn" class="secondary">2. 푸시 알림 허용하기</button>
<label>차주 휴대전화 번호<input id="phone" inputmode="numeric" autocomplete="tel" placeholder="01012345678" maxlength="11"></label>
<label style="font-weight:500"><input id="agree" type="checkbox" style="width:auto;margin-right:7px">개인정보 수집·이용 및 차량호출 알림 수신에 동의합니다.</label>
<button id="registerBtn" class="primary">허용하고 등록</button><div id="regMsg" class="msg"></div>
<p class="note small">아이폰은 Safari 공유 버튼 → ‘홈 화면에 추가’ 후 설치된 화면에서 다시 접속하세요.</p>
</section>

<section id="callBox" class="card hidden"><h2>차량 호출</h2><p>차주에게 요청 내용을 안전하게 전달합니다.</p>
<button data-kind="move" class="primary callBtn">차량이동요청</button>
<button data-kind="emergency" class="danger callBtn">긴급호출</button><div id="callMsg" class="msg"></div>
<p class="note">반복·허위 호출은 제한될 수 있습니다.</p></section>
</main>
<script>
let deferredPrompt=null, code='', pushSubscription=null;
const $=id=>document.getElementById(id);
function msg(id,text,ok){const e=$(id);e.textContent=text;e.className='msg show '+(ok?'ok':'err')}
function isStandalone(){return matchMedia('(display-mode: standalone)').matches||navigator.standalone===true}
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;$('installBtn').textContent='1. 앱 설치하기'});
$('installBtn').onclick=async()=>{if(isStandalone()){alert('이미 앱으로 설치되어 있습니다.');return}if(deferredPrompt){deferredPrompt.prompt();await deferredPrompt.userChoice;deferredPrompt=null}else alert('브라우저 메뉴에서 “홈 화면에 추가” 또는 “앱 설치”를 선택해 주세요.')};
$('notifyBtn').onclick=async()=>{if(!('Notification'in window)){alert('이 기기는 푸시 알림을 지원하지 않습니다.');return}const p=await Notification.requestPermission();if(p!=='granted'){alert('알림을 허용해야 등록할 수 있습니다.');return}
try{const r=await fetch('/api/vapid-public');const j=await r.json();if(j.publicKey&&'serviceWorker'in navigator){const reg=await navigator.serviceWorker.ready;pushSubscription=await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:urlBase64ToUint8Array(j.publicKey)});$('notifyBtn').textContent='2. 알림 허용 완료'}}catch(e){$('notifyBtn').textContent='2. 알림 허용 완료'}};
function urlBase64ToUint8Array(s){const p='='.repeat((4-s.length%4)%4),b=(s+p).replace(/-/g,'+').replace(/_/g,'/'),raw=atob(b),a=new Uint8Array(raw.length);for(let i=0;i<raw.length;i++)a[i]=raw.charCodeAt(i);return a}
async function load(){code=new URLSearchParams(location.search).get('qr')||'';$('qrCode').textContent=code||'QR번호 없음';
const r=await fetch('/api/qr?code='+encodeURIComponent(code));const j=await r.json();
if(!r.ok||!j.valid){$('status').textContent='사용 불가';$('invalidBox').classList.remove('hidden');return}
if(j.registered){$('status').textContent='등록 차량';$('status').className='status ok';$('callBox').classList.remove('hidden')}else{$('status').textContent='미등록';$('registerBox').classList.remove('hidden')}}
$('registerBtn').onclick=async()=>{const phone=$('phone').value.replace(/\D/g,'');if(!/^01[016789]\d{7,8}$/.test(phone))return msg('regMsg','올바른 휴대전화 번호를 입력해 주세요.',false);
if(!$('agree').checked)return msg('regMsg','개인정보 동의가 필요합니다.',false);
if(Notification.permission!=='granted')return msg('regMsg','먼저 푸시 알림을 허용해 주세요.',false);
if(!isStandalone())return msg('regMsg','앱을 설치한 뒤 설치된 앱에서 다시 등록해 주세요.',false);
const r=await fetch('/api/register',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({code,phone,subscription:pushSubscription})});const j=await r.json();
if(r.ok){msg('regMsg','차량 등록이 완료되었습니다.',true);setTimeout(()=>location.reload(),900)}else msg('regMsg',j.error||'등록하지 못했습니다.',false)};
document.querySelectorAll('.callBtn').forEach(b=>b.onclick=async()=>{b.disabled=true;const r=await fetch('/api/request',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({code,kind:b.dataset.kind})});const j=await r.json();msg('callMsg',r.ok?'요청이 접수되었습니다. 차주에게 알림을 보냈습니다.':(j.error||'요청하지 못했습니다.'),r.ok);b.disabled=false});
if('serviceWorker'in navigator)navigator.serviceWorker.register('/sw.js');load();
</script></body></html>
