<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>우리APT 차량이동 호출</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background-color: #f5f7fa; padding: 20px; box-sizing: border-box; }
    .card { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); text-align: center; max-width: 400px; width: 100%; box-sizing: border-box; display: none; }
    h1 { font-size: 22px; color: #1a202c; margin-bottom: 8px; }
    p { font-size: 14px; color: #718096; margin-bottom: 24px; line-height: 1.5; }
    button { width: 100%; padding: 14px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; transition: all 0.2s; margin-bottom: 12px; }
    #pushButton { background-color: #3182ce; color: white; }
    #pushButton:disabled { background-color: #cbd5e0; color: #718096; cursor: not-allowed; }
    #emergencyButton { background-color: #e53e3e; color: white; display: none; }
    #emergencyButton:disabled { background-color: #fed7d7; color: #e53e3e; cursor: not-allowed; }
    #pushResult { margin-top: 16px; font-size: 14px; font-weight: 500; min-height: 20px; line-height: 1.4; }
    #loading { font-size: 16px; color: #4a5568; font-weight: bold; }
    #errorCard h1 { color: #e53e3e; }
  </style>
  <script src="https://jsdelivr.net"></script>
</head>
<body>

  <!-- 1. 진입 시 최초 상태 체크 중 로딩 바 -->
  <div id="loading">차량 및 QR 상태 확인 중...</div>

  <!-- 2. 백엔드 검증 결과 등록되지 않았을 때 띄우는 미등록 오류 카드 (철저한 차단) -->
  <div id="errorCard" class="card">
    <h1>⚠️ 미등록 스마트 QR</h1>
    <p>아직 차주 등록이 완료되지 않은 차량 QR 코드입니다.<br>등록방(register.html)에서 푸시알림 설치 및 최초 차주 등록을 완료한 후 이용해 주세요.</p>
  </div>

  <!-- 3. 정상 등록된 차량일 때만 안전하게 열리는 차량이동요청 카드 -->
  <div id="callCard" class="card">
    <h1>🚗 차량이동 요청</h1>
    <p>앞 차량 때문에 차를 빼지 못하고 계신가요?<br>차주에게 안전하게 이동 요청 알림을 보냅니다.</p>
    <button id="pushButton" disabled>푸시알림 보내기</button>
    <button id="emergencyButton">🚨 차주와 긴급 통화하기</button>
    <div id="pushResult"></div>
  </div>

  <script type="module">
    const supabaseUrl=window.location.origin.includes("localhost")?"":Deno.env.get("SUPABASE_URL");const supabaseKey=window.location.origin.includes("localhost")?"":Deno.env.get("SUPABASE_ANON_KEY");const db=supabase.createClient(supabaseUrl||"https://supabase.co",supabaseKey||"your-anon-key");const urlParams=new URLSearchParams(window.location.search);const rawQr=urlParams.get("qr")||"";const qrCode=String(rawQr).trim().toUpperCase().replace(/[^A-Z0-9_-]/g,"");function getOrCreateSessionId(){let sessionId=localStorage.getItem("caller_session_id");if(!sessionId||sessionId.length<12){sessionId="sess_"+Math.random().toString(36).substring(2,14);localStorage.setItem("caller_session_id",sessionId)}return sessionId}const callerSessionId=getOrCreateSessionId();async function verifyQrAndInitialize(){const loading=document.getElementById("loading");const errorCard=document.getElementById("errorCard");const callCard=document.getElementById("callCard");if(!qrCode){loading.textContent="오류: 올바르지 않은 QR 접근입니다.";return}try{const{data:qrStatus,error:statusError}=await db.functions.invoke("send-vehicle-push",{body:{action:"status",qr_code:qrCode}});if(statusError||!qrStatus){loading.textContent="시스템 점검 중입니다. 잠시 후 다시 시도해 주세요.";return}loading.style.display="none";if(qrStatus.exists===false||qrStatus.is_registered===false){errorCard.style.display="block";return}callCard.style.display="block";await checkCallStatus()}catch(err){loading.textContent="네트워크 통신 오류가 발생했습니다."}}async function checkCallStatus(){const pushButton=document.getElementById("pushButton");const emergencyButton=document.getElementById("emergencyButton");try{const{data,error}=await db.functions.invoke("send-vehicle-push",{body:{action:"call-status",qr_code:qrCode,caller_session_id:callerSessionId}});if(error||!data||data.ok===false)return;if(data.next_call_available){pushButton.disabled=false;pushButton.textContent=data.call_count===0?"푸시알림 보내기":`${data.call_count}차 요청 완료 (추가 가능)`}else{pushButton.disabled=true;if(data.call_count>=3){pushButton.textContent="3차 호출 완료 (호출 마감)"}else{pushButton.textContent="대기 시간 제한 (잠시 후 가능)"}}if(emergencyButton){if(data.emergency_available){emergencyButton.style.display="block";emergencyButton.disabled=false;emergencyButton.textContent="🚨 차주와 긴급 통화하기"}else{if(data.emergency_call_used){emergencyButton.style.display="block";emergencyButton.disabled=true;emergencyButton.textContent="❌ 긴급통화 사용 완료"}else if(data.call_count>=3){emergencyButton.style.display="block";emergencyButton.disabled=true;emergencyButton.textContent="⏳ 잠시 후 긴급통화 가능"}else{emergencyButton.style.display="none"}}}}catch(err){console.error(err)}}async function sendVehicleCall(){const pushButton=document.getElementById("pushButton");const resultMessage=document.getElementById("pushResult");pushButton.disabled=true;pushButton.textContent="전송 중...";try{const{data,error}=await db.functions.invoke("send-vehicle-push",{body:{action:"call",qr_code:qrCode,caller_session_id:callerSessionId}});if(error||(data&&data.ok===false))throw new Error(data?.message||"전송 실패");resultMessage.style.color="green";resultMessage.textContent=`🎉 ${data.call_count}차 차량이동 요청이 차주에게 전송되었습니다.`;await checkCallStatus()}catch(error){resultMessage.style.color="red";resultMessage.textContent="전송 실패: "+error.message;pushButton.disabled=false;pushButton.textContent="푸시알림 보내기"}}async function startEmergencyCall(){const{data,error}=await db.functions.invoke("send-vehicle-push",{body:{action:"emergency-call",qr_code:qrCode,caller_session_id:callerSessionId,caller_phone:"00000000000"}});if(!error&&data&&data.tel_url)window.location.href=data.tel_url}document.addEventListener("DOMContentLoaded",()=>{verifyQrAndInitialize();document.getElementById("pushButton")?.addEventListener("click",sendVehicleCall);document.getElementById("emergencyButton")?.addEventListener("click",startEmergencyCall)});
  </script>
</body>
</html>
