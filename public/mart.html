<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
  >

  <meta name="theme-color" content="#16a34a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <link
    rel="manifest"
    href="/mart-manifest.webmanifest"
  >

  <link
    rel="apple-touch-icon"
    href="/icons/icon-192.png"
  >

  <title>우리마트 앱 설치</title>

  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-messaging-compat.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
    }

    body {
      min-height: 100vh;
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f4f7fb;
      color: #111827;
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Apple SD Gothic Neo",
        "Noto Sans KR",
        "Malgun Gothic",
        Arial,
        sans-serif;
    }

    button {
      font-family: inherit;
    }

    .container {
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
    }

    .card {
      display: none;
      width: 100%;
      padding: 30px 22px;
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 10px 35px rgba(15, 23, 42, 0.1);
      text-align: center;
    }

    .card.active {
      display: block;
    }

    h1,
    h2 {
      margin: 0;
      line-height: 1.4;
      word-break: keep-all;
    }

    h1 {
      margin-bottom: 22px;
      font-size: 27px;
    }

    h2 {
      margin-bottom: 18px;
      font-size: 25px;
    }

    .benefits {
      margin: 0 0 23px;
      padding: 20px 18px;
      border-radius: 13px;
      background: #f8fafc;
      text-align: left;
      font-size: 17px;
      font-weight: 700;
      line-height: 2;
    }

    .guide {
      margin: 0 0 23px;
      color: #475569;
      font-size: 16px;
      line-height: 1.8;
      word-break: keep-all;
    }

    .guide-box {
      margin: 0 0 22px;
      padding: 17px;
      border-radius: 12px;
      background: #f0fdf4;
      color: #166534;
      font-size: 16px;
      font-weight: 700;
      line-height: 1.8;
    }

    button {
      width: 100%;
      min-height: 56px;
      padding: 14px 16px;
      border: 0;
      border-radius: 11px;
      background: #16a34a;
      color: #ffffff;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
    }

    button:disabled {
      background: #cbd5e1;
      color: #64748b;
      cursor: not-allowed;
    }

    .status {
      display: none;
      margin-top: 17px;
      padding: 13px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.6;
      word-break: keep-all;
    }

    .status.show {
      display: block;
    }

    .status.success {
      background: #ecfdf5;
      color: #15803d;
    }

    .status.error {
      background: #fef2f2;
      color: #dc2626;
    }

    .status.waiting {
      background: #eff6ff;
      color: #1d4ed8;
    }

    .complete-icon {
      margin-bottom: 18px;
      font-size: 62px;
      line-height: 1;
    }

    .complete-message {
      margin: 0 0 25px;
      color: #475569;
      font-size: 16px;
      line-height: 1.8;
      word-break: keep-all;
    }
  </style>
</head>

<body>

  <main class="container">

    <!-- 1. 우리마트 앱 설치 안내 화면 -->
    <section
      id="installCard"
      class="card active"
    >
      <h1>우리마트 앱 설치</h1>

      <div class="benefits">
        <div>✅ 오늘의 특가 실시간 알림</div>
        <div>✅ 행사상품 할인 알림</div>
        <div>✅ 공동구매 할인 알림</div>
        <div>✅ 모바일 할인쿠폰 제공</div>
      </div>

      <div class="guide">
        앱 설치와 푸시 알림은<br>
        우리마트 행사 정보를 받기 위해<br>
        반드시 필요합니다.
      </div>

      <div class="guide-box">
        계속하기를 누르면<br>
        앱 설치가 시작됩니다.
      </div>

      <button
        id="continueButton"
        type="button"
      >
        계속하기
      </button>

      <div
        id="installStatus"
        class="status"
      ></div>
    </section>


    <!-- 2. 푸시 알림 허용 화면 -->
    <section
      id="pushCard"
      class="card"
    >
      <h2>푸시 알림을 허용해 주세요</h2>

      <div class="guide">
        오늘의 특가와 행사 정보를 받으려면<br>
        푸시 알림을 반드시 허용해야 합니다.
      </div>

      <button
        id="pushButton"
        type="button"
      >
        푸시 알림 허용하기
      </button>

      <div
        id="pushStatus"
        class="status"
      ></div>
    </section>


    <!-- 3. 설치 완료 화면 -->
    <section
      id="completeCard"
      class="card"
    >
      <div class="complete-icon">
        ✅
      </div>

      <h2>설치가 완료되었습니다</h2>

      <div class="complete-message">
        이제 우리마트의 오늘의 특가,<br>
        행사상품, 공동구매 및 할인쿠폰<br>
        알림을 받을 수 있습니다.
      </div>

      <button
        id="openMartButton"
        type="button"
      >
        우리마트 보기
      </button>
    </section>

  </main>


  <script>
    (() => {
      "use strict";

      const VAPID_KEY =
        "BDtVeUPEh-pooMUUtj4Bd2f5x7EHuWyx4TeunbaQvR8WQs65qwNxryhhORYqS5mxxWMn0GogdgDs1Qod93Vj0jM";

      const firebaseConfig = {
        apiKey:
          "AIzaSyB3nZdmUrj2wsKPQpOV8dLso7i17fZo0Hc",

        authDomain:
          "wooriapt-carqr.firebaseapp.com",

        projectId:
          "wooriapt-carqr",

        storageBucket:
          "wooriapt-carqr.firebasestorage.app",

        messagingSenderId:
          "101299637796",

        appId:
          "1:101299637796:web:cb69372592026b7aa192b1"
      };

      if (!firebase.apps.length) {
        firebase.initializeApp(
          firebaseConfig
        );
      }

      const messaging =
        firebase.messaging();

      const installCard =
        document.getElementById(
          "installCard"
        );

      const pushCard =
        document.getElementById(
          "pushCard"
        );

      const completeCard =
        document.getElementById(
          "completeCard"
        );

      const continueButton =
        document.getElementById(
          "continueButton"
        );

      const pushButton =
        document.getElementById(
          "pushButton"
        );

      const openMartButton =
        document.getElementById(
          "openMartButton"
        );

      const installStatus =
        document.getElementById(
          "installStatus"
        );

      const pushStatus =
        document.getElementById(
          "pushStatus"
        );

      let deferredInstallPrompt =
        null;


      function showCard(card) {
        [
          installCard,
          pushCard,
          completeCard
        ].forEach(element => {
          element.classList.remove(
            "active"
          );
        });

        card.classList.add(
          "active"
        );
      }


      function setStatus(
        element,
        message,
        type
      ) {
        element.textContent =
          message;

        element.className =
          "status show " + type;
      }


      function clearStatus(element) {
        element.textContent = "";
        element.className =
          "status";
      }


      function isInstalledApp() {
        return (
          window.matchMedia(
            "(display-mode: standalone)"
          ).matches ||
          window.navigator.standalone ===
            true
        );
      }


      function isIOS() {
        return /iphone|ipad|ipod/i.test(
          navigator.userAgent
        );
      }


      async function registerServiceWorker() {
        if (
          !(
            "serviceWorker" in
            navigator
          )
        ) {
          throw new Error(
            "현재 브라우저에서는 푸시 알림을 지원하지 않습니다."
          );
        }

        await navigator
          .serviceWorker
          .register(
            "/firebase-messaging-sw.js"
          );

        return await navigator
          .serviceWorker
          .ready;
      }


      async function createPushToken() {
        if (
          !(
            "Notification" in
            window
          )
        ) {
          throw new Error(
            "현재 브라우저에서는 푸시 알림을 사용할 수 없습니다."
          );
        }

        const permission =
          await Notification
            .requestPermission();

        if (
          permission !==
          "granted"
        ) {
          throw new Error(
            "푸시 알림을 허용해야 행사 알림을 받을 수 있습니다."
          );
        }

        const serviceWorkerRegistration =
          await registerServiceWorker();

        const token =
          await messaging.getToken({
            vapidKey:
              VAPID_KEY,

            serviceWorkerRegistration:
              serviceWorkerRegistration
          });

        if (!token) {
          throw new Error(
            "푸시 알림 연결에 실패했습니다."
          );
        }

        return token;
      }


      continueButton.addEventListener(
        "click",
        async () => {
          clearStatus(
            installStatus
          );

          continueButton.disabled =
            true;

          continueButton.textContent =
            "앱 설치 중...";

          try {
            if (
              isInstalledApp()
            ) {
              localStorage.setItem(
                "martPwaInstalled",
                "true"
              );

              showCard(
                pushCard
              );

              return;
            }

            if (isIOS()) {
              setStatus(
                installStatus,
                "화면 아래 공유 버튼을 누른 후 ‘홈 화면에 추가’를 선택하고 설치된 우리마트 앱을 실행해 주세요.",
                "waiting"
              );

              return;
            }

            if (
              !deferredInstallPrompt
            ) {
              /*
               * 자동차 QR에서 사용한 것과 동일하게
               * 설치 이벤트가 나타나지 않아도 버튼이 멈추지 않고
               * 푸시 알림 허용 화면으로 이동합니다.
               */
              localStorage.setItem(
                "martPwaInstalled",
                "true"
              );

              showCard(
                pushCard
              );

              return;
            }

            deferredInstallPrompt
              .prompt();

            const result =
              await deferredInstallPrompt
                .userChoice;

            deferredInstallPrompt =
              null;

            if (
              result.outcome ===
              "accepted"
            ) {
              localStorage.setItem(
                "martPwaInstalled",
                "true"
              );

              showCard(
                pushCard
              );

              return;
            }

            throw new Error(
              "앱 설치를 완료해 주세요."
            );

          } catch (error) {
            setStatus(
              installStatus,
              error.message ||
                "앱 설치를 완료하지 못했습니다.",
              "error"
            );

          } finally {
            continueButton.disabled =
              false;

            continueButton.textContent =
              "계속하기";
          }
        }
      );


      pushButton.addEventListener(
        "click",
        async () => {
          clearStatus(
            pushStatus
          );

          pushButton.disabled =
            true;

          pushButton.textContent =
            "푸시 알림 등록 중...";

          try {
            const pushToken =
              await createPushToken();

            localStorage.setItem(
              "martPushToken",
              pushToken
            );

            localStorage.setItem(
              "martPushRegistered",
              "true"
            );

            showCard(
              completeCard
            );

          } catch (error) {
            setStatus(
              pushStatus,
              error.message ||
                "푸시 알림 등록에 실패했습니다.",
              "error"
            );

          } finally {
            pushButton.disabled =
              false;

            pushButton.textContent =
              "푸시 알림 허용하기";
          }
        }
      );


      openMartButton.addEventListener(
        "click",
        () => {
          window.location.href =
            "/";
        }
      );


      window.addEventListener(
        "beforeinstallprompt",
        event => {
          event.preventDefault();

          deferredInstallPrompt =
            event;
        }
      );


      window.addEventListener(
        "appinstalled",
        () => {
          deferredInstallPrompt =
            null;

          localStorage.setItem(
            "martPwaInstalled",
            "true"
          );

          showCard(
            pushCard
          );
        }
      );


      messaging.onMessage(
        payload => {
          const notification =
            payload &&
            payload.notification;

          if (notification) {
            alert(
              (
                notification.title ||
                "우리마트"
              ) +
              "\n" +
              (
                notification.body ||
                ""
              )
            );
          }
        }
      );


      function initializePage() {
        const pushRegistered =
          localStorage.getItem(
            "martPushRegistered"
          ) === "true";

        if (pushRegistered) {
          showCard(
            completeCard
          );

          return;
        }

        if (
          isInstalledApp() ||
          localStorage.getItem(
            "martPwaInstalled"
          ) === "true"
        ) {
          showCard(
            pushCard
          );

          return;
        }

        showCard(
          installCard
        );
      }


      initializePage();

    })();
  </script>

</body>
</html>
