<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
  >

  <meta name="theme-color" content="#16a34a">

  <link
    rel="manifest"
    href="/mart-manifest.webmanifest"
  >

  <title>우리마트 앱 설치</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
    }

    body {
      min-height: 100vh;
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f4f7fb;
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        Roboto,
        Arial,
        sans-serif;
      color: #111827;
    }

    .card {
      display: none;
      width: 100%;
      max-width: 420px;
      padding: 30px 22px;
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 10px 35px rgba(15, 23, 42, 0.1);
      text-align: center;
    }

    .card.active {
      display: block;
    }

    h1 {
      margin: 0 0 22px;
      font-size: 27px;
      line-height: 1.4;
    }

    .benefits {
      margin: 0 0 23px;
      padding: 20px 18px;
      border-radius: 13px;
      background: #f8fafc;
      text-align: left;
      font-size: 17px;
      font-weight: 700;
      line-height: 2;
    }

    .guide {
      margin: 0 0 23px;
      color: #475569;
      font-size: 16px;
      line-height: 1.8;
      word-break: keep-all;
    }

    button {
      width: 100%;
      min-height: 56px;
      padding: 14px 16px;
      border: 0;
      border-radius: 11px;
      background: #16a34a;
      color: #ffffff;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
    }

    button:disabled {
      background: #cbd5e1;
      color: #64748b;
      cursor: not-allowed;
    }

    .status {
      min-height: 24px;
      margin-top: 17px;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.6;
      word-break: keep-all;
    }

    .success {
      color: #15803d;
    }

    .error {
      color: #dc2626;
    }

    .waiting {
      color: #1d4ed8;
    }
  </style>
</head>

<body>

  <section id="installCard" class="card active">
    <h1>우리마트 앱 설치</h1>

    <div class="benefits">
      <div>✅ 오늘의 특가 실시간 알림</div>
      <div>✅ 행사상품 할인 알림</div>
      <div>✅ 공동구매 할인 알림</div>
      <div>✅ 모바일 할인쿠폰 제공</div>
    </div>

    <div class="guide">
      앱 설치와 푸시알림을 허용하면<br>
      행사 정보를 가장 먼저 받아볼 수 있습니다.
    </div>

    <button id="continueButton" type="button">
      계속하기
    </button>

    <div id="installStatus" class="status"></div>
  </section>

  <section id="pushCard" class="card">
    <h1>푸시알림 허용</h1>

    <div class="guide">
      오늘의 특가와 행사정보를 받으려면<br>
      푸시알림을 허용해 주세요.
    </div>

    <button id="pushButton" type="button">
      푸시알림 허용
    </button>

    <div id="pushStatus" class="status"></div>
  </section>
