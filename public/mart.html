<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
  >

  <meta name="theme-color" content="#16a34a">

  <link
    rel="manifest"
    href="/mart-manifest.webmanifest"
  >

  <title>우리마트 앱 설치</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
    }

    body {
      min-height: 100vh;
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f4f7fb;
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        Roboto,
        Arial,
        sans-serif;
      color: #111827;
    }

    .card {
      display: none;
      width: 100%;
      max-width: 420px;
      padding: 28px 22px;
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 10px 35px rgba(15, 23, 42, 0.1);
      text-align: center;
    }

    .card.active {
      display: block;
    }

    h1 {
      margin: 0 0 18px;
      font-size: 26px;
      line-height: 1.4;
    }

    p {
      margin: 0 0 20px;
      color: #64748b;
      font-size: 15px;
      line-height: 1.7;
    }

    button {
      width: 100%;
      min-height: 54px;
      padding: 13px 16px;
      border: 0;
      border-radius: 11px;
      background: #16a34a;
      color: #ffffff;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
    }

    button:disabled {
      background: #cbd5e1;
      color: #64748b;
      cursor: not-allowed;
    }

    .benefits {
      margin: 0 0 22px;
      padding: 18px;
      border-radius: 12px;
      background: #f8fafc;
      text-align: left;
      color: #111827;
      font-size: 16px;
      font-weight: 700;
      line-height: 1.9;
    }

    .guide {
      margin: 16px 0 20px;
      padding: 18px;
      border-radius: 12px;
      background: #f8fafc;
      color: #334155;
      font-size: 16px;
      line-height: 1.8;
    }

    .status {
      min-height: 24px;
      margin-top: 16px;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.6;
      word-break: keep-all;
    }

    .success {
      color: #15803d;
    }

    .error {
      color: #dc2626;
    }

    .waiting {
      color: #1d4ed8;
    }
  </style>
</head>

<body>

  <section id="installCard" class="card active">
    <h1>우리마트 앱 설치</h1>

    <div class="benefits">
      <div>✅ 오늘의 특가 실시간 알림</div>
      <div>✅ 행사상품 할인 알림</div>
      <div>✅ 공동구매 할인 알림</div>
      <div>✅ 모바일 할인쿠폰 제공</div>
    </div>

    <p>
      앱 설치와 푸시알림을 허용하면<br>
      행사 정보를 가장 먼저 받아볼 수 있습니다.
    </p>

    <button id="continueButton" type="button">
      계속하기
    </button>

    <div id="installStatus" class="status"></div>
  </section>

  <section id="pushCard" class="card">
    <h1>푸시 알림 승인</h1>

    <div class="guide">
      오늘의 특가와 행사 정보를 받기 위해<br>
      푸시 알림을 허용해 주세요.
    </div>

    <button id="pushButton" type="button">
      푸시 알림 허용
    </button>

    <div id="pushStatus" class="status"></div>
  </section>

  <section id="completeCard" class="card">
    <h1>설치 완료</h1>

    <p>
      우리마트 앱 설치와<br>
      푸시 알림 설정이 완료되었습니다.
    </p>

    <button id="completeButton" type="button">
      우리마트 보기
    </button>
  </section>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-messaging-compat.js"></script>

  <script>
    const API_URL =
      "https://dcysjuxyjqtvkihdsjvv.supabase.co/functions/v1/register-mart-push";

    const SUPABASE_KEY =
      "sb_publishable_RZBX7u1v8MLBCfEJT0-eRg_jPcIulG2";

    const FIREBASE_CONFIG = {
      apiKey: "AIzaSyB3nZdmUrj2wsKPQpOV8dLso7i17fZo0Hc",
      authDomain: "wooriapt-carqr.firebaseapp.com",
      projectId: "wooriapt-carqr",
      storageBucket: "wooriapt-carqr.firebasestorage.app",
      messagingSenderId: "101299637796",
      appId: "1:101299637796:web:cb69372592026b7aa192b1"
    };

    const VAPID_KEY =
      "BDtVeUPEh-pooMUUtj4Bd2f5x7EHuWyx4TeunbaQvR8WQs65qwNxryhhORYoS5mxxWMn0GogdgDs1Qod93Vj0jM";

    const INSTALL_FINISHED_KEY =
      "wooriapt_mart_install_finished";

    const params =
      new URLSearchParams(window.location.search);

    const storeCode =
      cleanStoreCode(
        params.get("store") || "STORE0001"
      );

    const source =
      String(
        params.get("source") || "signboard"
      ).trim();

    const MART_MAIN_URL =
      "/?store=" +
      encodeURIComponent(storeCode) +
      "&source=" +
      encodeURIComponent(source);

    let deferredInstallPrompt = null;

    const installCard =
      document.getElementById("installCard");

    const pushCard =
      document.getElementById("pushCard");

    const completeCard =
      document.getElementById("completeCard");

    const continueButton =
      document.getElementById("continueButton");

    const pushButton =
      document.getElementById("pushButton");

    const completeButton =
      document.getElementById("completeButton");

    const installStatus =
      document.getElementById("installStatus");

    const pushStatus =
      document.getElementById("pushStatus");

    function cleanStoreCode(value) {
      return String(value || "")
        .trim()
        .toUpperCase()
        .replace(/[^A-Z0-9_-]/g, "");
    }

    function isInstalledApp() {
      return (
        window.matchMedia(
          "(display-mode: standalone)"
        ).matches ||
        window.navigator.standalone === true
      );
    }

    function showCard(card) {
      installCard.classList.remove("active");
      pushCard.classList.remove("active");
      completeCard.classList.remove("active");

      card.classList.add("active");
      window.scrollTo(0, 0);
    }

    function setStatus(element, message, type) {
      element.textContent = message || "";
      element.className = "status";

      if (type) {
        element.classList.add(type);
      }
    }

    async function callApi(payload) {
      const response =
        await fetch(API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization":
              "Bearer " + SUPABASE_KEY,
            "apikey": SUPABASE_KEY
          },
          body: JSON.stringify(payload)
        });

      const text =
        await response.text();

      let data = {};

      try {
        data = text
          ? JSON.parse(text)
          : {};
      } catch {
        data = {};
      }

      if (
        !response.ok ||
        data.ok === false ||
        data.success === false
      ) {
        const apiError =
          new Error(
            data.message ||
            data.error ||
            "서버 처리에 실패했습니다."
          );

        apiError.data = data;

        throw apiError;
      }

      return data;
    }

    async function registerServiceWorker() {
      if (!("serviceWorker" in navigator)) {
        throw new Error(
          "이 브라우저에서는 푸시를 사용할 수 없습니다."
        );
      }

      return navigator.serviceWorker.register(
        "/firebase-messaging-sw.js",
        { scope: "/" }
      );
    }

    function withTimeout(
      promise,
      milliseconds,
      message
    ) {
      let timeoutId;

      const timeoutPromise =
        new Promise((_, reject) => {
          timeoutId =
            setTimeout(() => {
              reject(
                new Error(message)
              );
            }, milliseconds);
        });

      return Promise.race([
        promise.finally(() => {
          clearTimeout(timeoutId);
        }),
        timeoutPromise
      ]);
    }

    async function createFcmToken() {
      const permission =
        await Notification.requestPermission();

      if (permission !== "granted") {
        throw new Error(
          "푸시 알림을 허용해 주세요."
        );
      }

      return withTimeout(
        (async function() {
          if (!firebase.apps.length) {
            firebase.initializeApp(
              FIREBASE_CONFIG
            );
          }

          const messaging =
            firebase.messaging();

          const registration =
            await registerServiceWorker();

          const token =
            await messaging.getToken({
              vapidKey: VAPID_KEY,
              serviceWorkerRegistration:
                registration
            });

          if (!token) {
            throw new Error(
              "토큰 발급 실패"
            );
          }

          return token;
        })(),
        3000,
        "푸시 연결 시간이 초과되었습니다."
      );
    }

    window.addEventListener(
      "beforeinstallprompt",
      function(event) {
        event.preventDefault();

        deferredInstallPrompt =
          event;
      }
    );

    window.addEventListener(
      "appinstalled",
      function() {
        deferredInstallPrompt =
          null;

        sessionStorage.setItem(
          INSTALL_FINISHED_KEY,
          "true"
        );

        showCard(
          pushCard
        );
      }
    );

    continueButton.addEventListener(
      "click",
      async function() {
        continueButton.disabled =
          true;

        continueButton.textContent =
          "앱 설치 중...";

        setStatus(
          installStatus,
          "앱 설치 화면을 열고 있습니다.",
          "waiting"
        );

        try {
          if (isInstalledApp()) {
            showCard(pushCard);
            return;
          }

          if (!deferredInstallPrompt) {
            sessionStorage.setItem(
              INSTALL_FINISHED_KEY,
              "true"
            );

            showCard(pushCard);
            return;
          }

          deferredInstallPrompt.prompt();

          const result =
            await deferredInstallPrompt.userChoice;

          deferredInstallPrompt =
            null;

          if (
            result.outcome === "accepted"
          ) {
            sessionStorage.setItem(
              INSTALL_FINISHED_KEY,
              "true"
            );

            showCard(pushCard);

            return;
          }

          throw new Error(
            "앱 설치를 완료해 주세요."
          );
        } catch (error) {
          setStatus(
            installStatus,
            error.message ||
            "앱 설치를 완료하지 못했습니다.",
            "error"
          );

          continueButton.disabled =
            false;

          continueButton.textContent =
            "계속하기";
        }
      }
    );

    pushButton.addEventListener(
      "click",
      async function() {
        pushButton.disabled =
          true;

        pushButton.textContent =
          "푸시 알림 등록 중...";

        setStatus(
          pushStatus,
          "푸시 알림을 설정하고 있습니다.",
          "waiting"
        );

        try {
          const fcmToken =
            await createFcmToken();

          await callApi({
            action: "register",
            store_code: storeCode,
            push_token: fcmToken,
            platform: "web",
            source: source,
            user_agent:
              navigator.userAgent
          });

          sessionStorage.removeItem(
            INSTALL_FINISHED_KEY
          );

          showCard(completeCard);
        } catch (error) {
          setStatus(
            pushStatus,
            error.message ||
            "푸시 알림 등록에 실패했습니다.",
            "error"
          );

          pushButton.disabled =
            false;

          pushButton.textContent =
            "푸시 알림 허용";
        }
      }
    );

    completeButton.addEventListener(
      "click",
      function() {
        window.location.href =
          MART_MAIN_URL;
      }
    );

    document.addEventListener(
      "DOMContentLoaded",
      function() {
        if (
          isInstalledApp() ||
          sessionStorage.getItem(
            INSTALL_FINISHED_KEY
          ) === "true"
        ) {
          showCard(pushCard);
          return;
        }

        showCard(installCard);
      }
    );
  </script>
</body>
</html>
